<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Sign In — Club Finder</title>
    <link rel="stylesheet" href="css/styles.css">

</head>


<body>

    <div class="top-header-line"></div>

    <div class="middle-header-line">
        <div class="header-content">

            <img src="assets/York_Logo.png" class="logo" alt="York University Logo">
            <div class="title">Club Finder</div>

        </div>
        <div class="navBoxes">

            <a href="index.html">Home</a>
            <a href="clubs.html">Explore Clubs</a>
            <a href="club_events.html">Club Events</a>
            <a href="club_signup.html">Club Sign Ups</a>
            <a href="about.html">About Us</a>

        </div>
    </div>

    <div class="bottom-header-line"></div>

    <!-- Login Section Main Content -->
    <div class="login-page">

        <div class="login-overlay"></div>

        <div class="login-card">
            <img src="assets/York_Logo.png" alt="York University Logo" class="login-logo">
            <h2 class="login-heading">Club Finder</h2>
            <p class="login-sub">Sign in with your York University credentials</p>

            <div class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="ex. name##@my.yorku.ca">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button class="signin-btn" onclick="handleLogin()">

                    <!-- Login arrow icon -->
                    <img src="assets/Enter_Button.png" alt="" aria-hidden="true" class="btn-icon">
                    Sign In
                </button>

                <p id="login-error" class="login-error" aria-live="polite"></p>
            </div>

        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const err  = document.getElementById('login-error');

            if (!user || !pass) {
                err.textContent = 'Please enter both your username and password.';
                return;
            }
            err.textContent = '';
            window.location.href = 'index.html';
        }

        // Second form of entry being enter key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>

</body>
</html>
