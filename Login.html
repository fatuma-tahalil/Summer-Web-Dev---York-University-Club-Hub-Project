<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In — Club Finder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="top-header-line"></div>

    <div class="middle-header-line">
        <div class="header-content">
            <img src="assets/York_Logo.png" class="logo" alt="York University Logo">
            <div class="title">Club Finder</div>
        </div>
        <div class="navBoxes">
            <a href="Index.html">Home</a>
            <a href="About.html">About Us</a>
            <a href="Clubs.html">Explore Clubs</a>
        </div>
    </div>

    <div class="bottom-header-line"></div>

    <!-- Hero backdrop (same as home) -->
    <div class="login-page">
        <div class="login-overlay"></div>

        <div class="login-card">
            <img src="assets/York_Logo.png" alt="York University Logo" class="login-logo">
            <h2 class="login-heading">Club Finder</h2>
            <p class="login-sub">Sign in with your York University credentials</p>

            <div class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="e.g. jsmith">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button class="signin-btn" onclick="handleLogin()">
                    <!-- Login arrow icon (SVG, matches the screenshot) -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Sign In
                </button>

                <p id="login-error" class="login-error" aria-live="polite"></p>
            </div>

        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const err  = document.getElementById('login-error');

            if (!user || !pass) {
                err.textContent = 'Please enter both your username and password.';
                return;
            }
            err.textContent = '';
            // Replace with real auth logic / redirect
            window.location.href = 'Index.html';
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>

</body>
</html>
