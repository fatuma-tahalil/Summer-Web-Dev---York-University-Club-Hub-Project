<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>

    <style>

        body{
        margin: 0;
        font-family: Arial. sans-serif;
        }

        .top-header-line{
        background-color:crimson;
        height: 20px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: left;
        }

        .middle-header-line{
        background-color:white;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 10px;
        box-sizing: border-box;
        }

        .bottom-header-line{
        background-color:crimson;
        height: 20px;
        width: 100%;
        display: flex;
        }

        .logo{
        height: 45px;
        }

        .header-content{
        display: flex;
        align-items: center;
        }

        .title{
        color: black;
        margin-left: 15px;
        font-size: 20px;
        font-weight: bold;
        }

        .navBoxes{
        display: flex;
        align-items: center;
        gap: 10px;
        padding-right: 15px;
        }

        .navBoxes a{
        text-decoration: none;
        color: black;
        border: 2px solid crimson;
        padding: 6px 12px;
        margin-left: 10px;
        transition: 0.2s;
        }

        .navBoxes a:hover{
        background-color: crimson;
        color: white;
        }

    </style>

</head>
<body>

<div class="top-header-line"></div>

<div class="middle-header-line">

    <div class = "header-content">
    <img src = "York Logo.png" class ="logo" alt = "York Logo">
    <div class = "title">Club Finder</div>
    </div>

    <div class="navBoxes">
        <a href = "Index.html">Home</a>
        <a href = "About.html">About Us</a>
        <a href = "Clubs.html">Explore Clubs</a>
    </div>
</div>

<div class="bottom-header-line"></div>


<p>This is the home page</p>


</body>
</html>
